<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Polimi Heritage Blue background -->
  <rect width="32" height="32" rx="7" fill="#102c53"/>
  <!-- Compass circle -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="white" stroke-width="1.2" opacity="0.4"/>
  <!-- Compass needle north (white) -->
  <polygon points="16,8 18.2,14.5 16,13.5 13.8,14.5" fill="white"/>
  <!-- Compass needle south (dimmed) -->
  <polygon points="16,24 13.8,17.5 16,18.5 18.2,17.5" fill="white" opacity="0.45"/>
  <!-- Center dot (accent blue) -->
  <circle cx="16" cy="16" r="1.6" fill="#4d87d4"/>
</svg>
